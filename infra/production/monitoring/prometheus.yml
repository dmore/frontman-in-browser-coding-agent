# =============================================================================
# Prometheus Configuration - Frontman Production
# Deployed to /etc/prometheus/prometheus.yml
# =============================================================================

global:
  scrape_interval: 15s
  evaluation_interval: 30s
  scrape_timeout: 10s

  external_labels:
    environment: production
    server: frontman-prod

# Alert rules
rule_files:
  - /etc/prometheus/alert-rules.yml

# Send alerts to Alertmanager
alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - 127.0.0.1:9093

# Scrape targets
scrape_configs:
  # ---- Prometheus self-monitoring ----
  - job_name: prometheus
    static_configs:
      - targets:
          - 127.0.0.1:9090

  # ---- System metrics (CPU, memory, disk, network) ----
  - job_name: node
    static_configs:
      - targets:
          - 127.0.0.1:9100

  # ---- PostgreSQL metrics ----
  - job_name: postgres
    static_configs:
      - targets:
          - 127.0.0.1:9187

  # ---- Health endpoint probes (via blackbox exporter) ----
  - job_name: blackbox-health
    metrics_path: /probe
    params:
      module: [http_2xx]
    static_configs:
      - targets:
          - https://api.frontman.sh/health
          - https://api.frontman.sh/health/ready
    relabel_configs:
      - source_labels: [__address__]
        target_label: __param_target
      - source_labels: [__param_target]
        target_label: instance
      - target_label: __address__
        replacement: 127.0.0.1:9115

