  <text x="40" y="50" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#888">SEO</text>
</g>

<!-- Divider -->
<line x1="64" y1="275" x2="559" y2="275" stroke="#1E2130" stroke-width="1"/>

<!-- Issue items that Frontman found and fixed -->
<text x="64" y="298" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#888">Issues auto-fixed by Frontman</text>

<!-- Fixed item 1 -->
<g transform="translate(64, 310)">
