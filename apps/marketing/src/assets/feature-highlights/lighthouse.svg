<svg width="623" height="439" viewBox="0 0 623 439" fill="none" xmlns="http://www.w3.org/2000/svg">
<!-- Dark background matching site theme -->
<rect width="623" height="439" rx="12" fill="#0D0F17"/>

<!-- Window chrome bar -->
<rect x="24" y="20" width="575" height="36" rx="8" fill="#1A1D2A"/>
<circle cx="44" cy="38" r="5" fill="#FF5F57"/>
<circle cx="60" cy="38" r="5" fill="#FEBC2E"/>
<circle cx="76" cy="38" r="5" fill="#28C840"/>
<rect x="200" y="30" width="220" height="16" rx="8" fill="#12141E"/>
<text x="260" y="42" font-family="system-ui, sans-serif" font-size="10" fill="#555">frontman.local</text>

<!-- Report card container -->
<rect x="40" y="72" width="543" height="348" rx="12" fill="#12141E" stroke="#1E2130" stroke-width="1"/>

<!-- Frontman badge top-left -->
<text x="64" y="100" font-family="system-ui, sans-serif" font-size="12" font-weight="600" fill="#A259FF">⚡ Frontman Lighthouse Audit</text>
<text x="64" y="116" font-family="system-ui, sans-serif" font-size="10" fill="#555">https://myapp.dev/dashboard</text>

<!-- Four score gauges row -->
<!-- Performance: 96 (green) -->
<g transform="translate(96, 170)">
  <circle cx="40" cy="40" r="38" stroke="#1E2130" stroke-width="5" fill="none"/>
  <circle cx="40" cy="40" r="38" stroke="#3DE94E" stroke-width="5" fill="none"
    stroke-dasharray="228.8" stroke-dashoffset="9.15" stroke-linecap="round"
    transform="rotate(-90, 40, 40)"/>
  <text x="40" y="36" text-anchor="middle" font-family="system-ui, sans-serif" font-size="24" font-weight="700" fill="#3DE94E">96</text>
  <text x="40" y="50" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#888">Performance</text>
</g>

<!-- Accessibility: 100 (green) -->
<g transform="translate(226, 170)">
  <circle cx="40" cy="40" r="38" stroke="#1E2130" stroke-width="5" fill="none"/>
  <circle cx="40" cy="40" r="38" stroke="#3DE94E" stroke-width="5" fill="none"
    stroke-dasharray="238.76" stroke-dashoffset="0" stroke-linecap="round"
    transform="rotate(-90, 40, 40)"/>
  <text x="40" y="36" text-anchor="middle" font-family="system-ui, sans-serif" font-size="24" font-weight="700" fill="#3DE94E">100</text>
  <text x="40" y="50" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#888">Accessibility</text>
</g>

<!-- Best Practices: 92 (green) -->
<g transform="translate(356, 170)">
  <circle cx="40" cy="40" r="38" stroke="#1E2130" stroke-width="5" fill="none"/>
  <circle cx="40" cy="40" r="38" stroke="#3DE94E" stroke-width="5" fill="none"
    stroke-dasharray="219.66" stroke-dashoffset="19.1" stroke-linecap="round"
    transform="rotate(-90, 40, 40)"/>
  <text x="40" y="36" text-anchor="middle" font-family="system-ui, sans-serif" font-size="24" font-weight="700" fill="#3DE94E">92</text>
  <text x="40" y="50" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#888">Best Practices</text>
</g>

<!-- SEO: 100 (green) -->
<g transform="translate(486, 170)">
  <circle cx="40" cy="40" r="38" stroke="#1E2130" stroke-width="5" fill="none"/>
  <circle cx="40" cy="40" r="38" stroke="#3DE94E" stroke-width="5" fill="none"
