procs:
  postgres:
    cmd: ["podman", "run", "--rm", "--name", "frontman-postgres", "-e", "POSTGRES_USER=postgres", "-e", "POSTGRES_PASSWORD=postgres", "-p", "5432:5432", "-v", "frontman-pgdata:/var/lib/postgresql/data", "docker.io/library/postgres:16"]
    stop:
      send-keys: ["<C-c>"]

  rescript:
    cmd: ["bash", "-c", "rm -f lib/bs/.compiler.log && make rescript-build && make rescript-watch"]

  server:
    cmd: ["bash", "-c", "echo 'Waiting for ReScript compiler...' && while [ ! -f lib/bs/.compiler.log ] || ! tail -1 lib/bs/.compiler.log 2>/dev/null | grep -q '^#Done'; do sleep 1; done && echo 'ReScript ready. Waiting for Postgres...' && while ! podman exec frontman-postgres pg_isready -U postgres 2>/dev/null; do sleep 2; done && echo 'Postgres ready, starting server...' && make dev-server"]
    env:
      FRONTMAN_INTERNAL_DEV: "true"

  client:
    cmd: ["bash", "-c", "echo 'Waiting for ReScript compiler...' && while [ ! -f lib/bs/.compiler.log ] || ! tail -1 lib/bs/.compiler.log 2>/dev/null | grep -q '^#Done'; do sleep 1; done && echo 'ReScript ready, starting client...' && make dev-client"]
    env:
      FRONTMAN_INTERNAL_DEV: "true"

  nextjs-bundle:
    cmd: ["bash", "-c", "echo 'Waiting for ReScript compiler...' && while [ ! -f lib/bs/.compiler.log ] || ! tail -1 lib/bs/.compiler.log 2>/dev/null | grep -q '^#Done'; do sleep 1; done && echo 'ReScript ready, starting tsup watch...' && cd libs/frontman-nextjs && yarn tsup --watch"]

  nextjs:
    cmd: ["bash", "-c", "echo 'Waiting for ReScript compiler...' && while [ ! -f lib/bs/.compiler.log ] || ! tail -1 lib/bs/.compiler.log 2>/dev/null | grep -q '^#Done'; do sleep 1; done && echo 'ReScript ready. Waiting for nextjs bundle...' && while [ ! -f libs/frontman-nextjs/dist/index.js ]; do sleep 1; done && echo 'Bundle ready, starting Next.js...' && make dev-nextjs"]
    env:
      FRONTMAN_INTERNAL_DEV: "true"

  marketing:
    cmd: ["make", "dev-marketing"]
