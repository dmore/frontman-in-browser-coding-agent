name: Discord Deploy Notification
description: Send deployment status notifications to Discord

inputs:
  status:
    description: Job status (success, failure, cancelled)
    required: true
  component:
    description: Deployed component name (Marketing, Server, Client)
    required: true
  webhook-url:
    description: Discord webhook URL
    required: true

runs:
  using: composite
  steps:
    - name: Send message
      shell: bash
      env:
        STATUS: ${{ inputs.status }}
        COMPONENT: ${{ inputs.component }}
        DISCORD_WEBHOOK_URL: ${{ inputs.webhook-url }}
      run: |
        set -euo pipefail

        if [ -z "${DISCORD_WEBHOOK_URL}" ]; then
          echo "DISCORD_WEBHOOK_URL is empty. Skipping notification."
          exit 0
        fi

        case "${STATUS}" in
          success)
            emoji=":white_check_mark:"
            status_text="succeeded"
            ;;
          failure)
            emoji=":x:"
            status_text="failed"
            ;;
          cancelled)
            emoji=":white_circle:"
            status_text="was cancelled"
            ;;
          *)
            emoji=":information_source:"
            status_text="finished with status ${STATUS}"
            ;;
        esac

        short_sha="${GITHUB_SHA::7}"
        run_url="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"

        # Build JSON payload using jq to handle escaping
        payload=$(jq -n \
          --arg emoji "$emoji" \
          --arg component "$COMPONENT" \
          --arg status_text "$status_text" \
          --arg repo "$GITHUB_REPOSITORY" \
          --arg branch "$GITHUB_REF_NAME" \
          --arg sha "$short_sha" \
          --arg actor "$GITHUB_ACTOR" \
          --arg url "$run_url" \
          '{content: "\($emoji) **\($component) deployment \($status_text)**\nRepository: \($repo)\nBranch: \($branch)\nCommit: \($sha)\nActor: \($actor)\nRun: \($url)"}')

        curl -fsS -X POST \
          -H "Content-Type: application/json" \
          -d "$payload" \
          "${DISCORD_WEBHOOK_URL}"
