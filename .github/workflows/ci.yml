name: CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_call:

jobs:
  setup:
    name: Setup & cache dependencies
    runs-on: self-hosted
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24.4.1'

      - name: Enable Corepack
        run: corepack enable

      - name: Cache Yarn
        uses: actions/cache@v4
        with:
          path: ~/.yarn/berry/cache
          key: yarn-${{ hashFiles('yarn.lock') }}
          restore-keys: yarn-

      - name: Install dependencies
        run: yarn install --immutable

      - name: Cleanup workspace
        if: always()
        run: |
          rm -rf node_modules .yarn/install-state.gz
          rm -rf libs/*/node_modules apps/*/node_modules test/sites/*/node_modules
          rm -rf /tmp/runner/work/_temp

  build:
    name: Build
    runs-on: self-hosted
    needs: [setup]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24.4.1'

      - name: Enable Corepack
        run: corepack enable

      - name: Cache Yarn
        uses: actions/cache@v4
        with:
          path: ~/.yarn/berry/cache
          key: yarn-${{ hashFiles('yarn.lock') }}
          restore-keys: yarn-

      - name: Install dependencies
        run: yarn install --immutable

      - name: Clean ReScript build cache
        run: yarn rescript clean

      - name: Build project
        run: make build

      - name: Cleanup workspace
        if: always()
        run: |
          rm -rf node_modules .yarn/install-state.gz
          rm -rf libs/*/node_modules apps/*/node_modules test/sites/*/node_modules

  test-frontman-client:
    name: Test frontman-client
    needs: [setup]
    runs-on: self-hosted
    permissions:
      contents: read
      pull-requests: write
      checks: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24.4.1'

      - name: Enable Corepack
        run: corepack enable

      - name: Cache Yarn
        uses: actions/cache@v4
        with:
          path: ~/.yarn/berry/cache
          key: yarn-${{ hashFiles('yarn.lock') }}
          restore-keys: yarn-

      - name: Install dependencies
        run: yarn install --immutable

      - name: Run tests with coverage
        run: make -C libs/frontman-client test-coverage

      - name: Coverage report
        uses: 5monkeys/cobertura-action@master
        with:
          path: libs/frontman-client/coverage/cobertura-coverage.xml
          minimum_coverage: 70
          show_missing: true
          skip_covered: false
          only_changed_files: false

      - name: Cleanup workspace
        if: always()
        run: |
          rm -rf node_modules .yarn/install-state.gz
          rm -rf libs/*/node_modules apps/*/node_modules test/sites/*/node_modules

