  lint-client:
    name: Lint libs/client
    needs: [setup]
    runs-on: self-hosted
    permissions:
      contents: read
      pull-requests: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check for changes in libs/client
        id: changes
        uses: dorny/paths-filter@v3
        with:
          filters: |
            client:
              - 'libs/client/**'

      - name: Setup Node.js
        if: steps.changes.outputs.client == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: '24.4.1'

      - name: Enable Corepack
        if: steps.changes.outputs.client == 'true'
        run: corepack enable

      - name: Cache Yarn
        if: steps.changes.outputs.client == 'true'
        uses: actions/cache@v4
        with:
          path: ~/.yarn/berry/cache
          key: yarn-${{ hashFiles('yarn.lock') }}
          restore-keys: yarn-

      - name: Install dependencies
        if: steps.changes.outputs.client == 'true'
        run: yarn install --immutable

      - name: Run biome lint
        if: steps.changes.outputs.client == 'true'
        run: cd libs/client && npx biome lint .

      - name: Cleanup workspace
        if: always()
        run: |
          rm -rf node_modules .yarn/install-state.gz
          rm -rf libs/*/node_modules apps/*/node_modules test/sites/*/node_modules

  protocol-check:
    name: Protocol schema check
    needs: [setup]
    runs-on: self-hosted
    permissions:
      contents: read
      pull-requests: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check for changes in libs/frontman-protocol
        id: changes
        uses: dorny/paths-filter@v3
        with:
          filters: |
            protocol:
              - 'libs/frontman-protocol/**'

      - name: Setup Node.js
        if: steps.changes.outputs.protocol == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: '24.4.1'

      - name: Enable Corepack
        if: steps.changes.outputs.protocol == 'true'
        run: corepack enable

      - name: Cache Yarn
        if: steps.changes.outputs.protocol == 'true'
        uses: actions/cache@v4
        with:
          path: ~/.yarn/berry/cache
          key: yarn-${{ hashFiles('yarn.lock') }}
          restore-keys: yarn-

      - name: Install dependencies
        if: steps.changes.outputs.protocol == 'true'
        run: yarn install --immutable

      - name: Build project
        if: steps.changes.outputs.protocol == 'true'
        run: make build

      - name: Check schemas are up to date
        if: steps.changes.outputs.protocol == 'true'
        run: make -C libs/frontman-protocol check-schemas

      - name: Fetch main branch for diff
        if: steps.changes.outputs.protocol == 'true'
        run: git fetch origin main:main

      - name: Check for breaking changes
        if: steps.changes.outputs.protocol == 'true'
        run: node libs/frontman-protocol/scripts/CheckBreakingChanges.res.mjs

      - name: Cleanup workspace
        if: always()
        run: |
          rm -rf node_modules .yarn/install-state.gz
          rm -rf libs/*/node_modules apps/*/node_modules test/sites/*/node_modules

  dead-code-client:
    name: Dead code analysis (client)
    needs: [setup]
    runs-on: self-hosted
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24.4.1'

      - name: Enable Corepack
        run: corepack enable

      - name: Cache Yarn
        uses: actions/cache@v4
        with:
          path: ~/.yarn/berry/cache
          key: yarn-${{ hashFiles('yarn.lock') }}
          restore-keys: yarn-

      - name: Install dependencies
        run: yarn install --immutable

      - name: Build ReScript
        run: yarn rescript clean && yarn rescript

      - name: Check for dead code
        working-directory: libs/client
        run: |
          output=$(npx rescript-tools reanalyze -config 2>&1)
          echo "$output"
          if ! echo "$output" | grep -q "Analysis reported 0 issues"; then
            echo "::error::Dead code detected in libs/client. Please remove unused code."
            exit 1
          fi
          echo "No dead code found."

      - name: Cleanup workspace
        if: always()
        run: |
          rm -rf node_modules .yarn/install-state.gz
          rm -rf libs/*/node_modules apps/*/node_modules test/sites/*/node_modules
