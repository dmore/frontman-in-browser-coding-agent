name: CLA Assistant

on:
  issue_comment:
    types: [created]
  pull_request_target:
    types: [opened, synchronize, reopened]

permissions:
  actions: write
  contents: write
  pull-requests: write
  statuses: write

jobs:
  cla-check:
    runs-on: ubuntu-latest
    steps:
      - name: CLA Assistant
        if: (github.event.comment.body == 'recheck' || github.event.comment.body == 'I have read the CLA Document and I hereby sign the CLA') || github.event_name == 'pull_request_target'
        uses: rdkcentral/contributor-assistant_github-action@c18dc0f3e30006c6bd4064ffc5d86aebf66af04a # master (node24 runtime)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PERSONAL_ACCESS_TOKEN: ${{ secrets.CLA_ASSISTANT_PAT }}
        with:
          path-to-signatures: "signatures/cla.json"
          path-to-document: "https://github.com/${{ github.repository }}/blob/main/CLA.md"
          branch: "main"
          allowlist: dependabot[bot],github-actions[bot]
          remote-organization-name: frontman-ai
          remote-repository-name: frontman
          create-file-commit-message: "chore: create CLA signature file"
          signed-commit-message: "chore: $contributorName signed the CLA"
          custom-notsigned-prcomment: |
            Thank you for your contribution! Before we can merge this PR, you need to sign our [Contributor License Agreement](https://github.com/${{ github.repository }}/blob/main/CLA.md).

            **To sign**, please comment on this PR with:

            > I have read the CLA Document and I hereby sign the CLA

            This is required for all contributors. The CLA ensures we can continue to offer Frontman under both open-source and commercial licenses. You only need to sign once — it covers all future contributions.
          custom-pr-sign-comment: "I have read the CLA Document and I hereby sign the CLA"
          lock-pullrequest-aftermerge: false
