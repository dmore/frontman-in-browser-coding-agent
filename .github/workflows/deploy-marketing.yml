name: Deploy Marketing

on:
  push:
    branches:
      - main
    paths:
      - 'apps/marketing/**'
      - 'libs/frontman-astro/**'
      - 'CHANGELOG.md'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy:
    name: Build and Deploy to Production
    runs-on: self-hosted
    environment: production
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: '24.4.1'

      - name: Enable Corepack
        run: corepack enable && corepack install

      - name: Cache dependencies
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
        with:
          path: ~/.yarn/berry/cache
          key: yarn-berry-${{ runner.os }}-${{ hashFiles('yarn.lock') }}
          restore-keys: yarn-berry-${{ runner.os }}-

      - name: Install dependencies
        run: yarn install --immutable

      - name: Build ReScript packages
        run: yarn rescript

      - name: Bundle astro integration
        run: yarn build:bundle
        working-directory: libs/frontman-astro

      - name: Build marketing site
        run: cd apps/marketing && yarn build

      - name: Deploy to Cloudflare Pages (Production)
        uses: cloudflare/wrangler-action@da0e0dfe58b7a431659754fdf3f186c529afbe65 # v3.14.1
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy apps/marketing/dist --project-name=frontman-marketing --branch=main

      - name: Submit to IndexNow
        if: success()
        continue-on-error: true
        run: node apps/marketing/scripts/indexnow.mjs

      - name: Notify Discord
        if: always()
        continue-on-error: true
        uses: ./.github/actions/discord-notify
        with:
          status: ${{ job.status }}
          component: Marketing
          webhook-url: ${{ secrets.DISCORD_WEBHOOK_URL }}
